<!DOCTYPE html>
<html>
<head>
    <title>MedicShare System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f7fa;
            text-align: center;
        }
        h1 {
            color: #2c7be5;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
        button {
            padding: 8px 15px;
            background: #2c7be5;
            color: white;
            border: none;
            cursor: pointer;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th {
            background: #2c7be5;
            color: white;
        }
        td {
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>MedicShare - Patient Management</h1>

    <div class="container">
        <h3>Add Patient</h3>

        <input type="text" id="name" placeholder="Patient Name">
        <input type="text" id="age" placeholder="Age">
        <input type="text" id="disease" placeholder="Disease">
        <br>
        <button onclick="addPatient()">Add Patient</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Disease</th>
                </tr>
            </thead>
            <tbody id="patientTable"></tbody>
        </table>
    </div>

<script>
let patients = [];
let id = 1;

function addPatient() {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let disease = document.getElementById("disease").value;

    if(name === "" || age === "" || disease === ""){
        alert("Please fill all fields!");
        return;
    }

    let patient = {
        id: id++,
        name: name,
        age: age,
        disease: disease
    };

    patients.push(patient);
    displayPatients();

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("disease").value = "";
}

function displayPatients() {
    let table = document.getElementById("patientTable");
    table.innerHTML = "";

    patients.forEach(p => {
        let row = `
            <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.age}</td>
                <td>${p.disease}</td>
            </tr>
        `;
        table.innerHTML += row;
    });
}
</script>

</body>
</html>
